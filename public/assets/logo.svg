<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="#1A1A2E"/>

  <defs>
    <!-- Main gradient: purple bottom-left to teal top-right -->
    <linearGradient id="tGrad" x1="36" y1="160" x2="164" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4ECDC4"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.424
                0 0 0 0 0.388
                0 0 0 0 1
                0 0 0 0.55 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- T mark with glow -->
  <g filter="url(#glow)">
    <!-- Horizontal crossbar -->
    <rect x="36" y="46" width="128" height="38" rx="12" fill="url(#tGrad)"/>
    <!-- Vertical stem -->
    <rect x="81" y="46" width="38" height="112" rx="12" fill="url(#tGrad)"/>
  </g>
</svg>
